{% extends "pages/settings/base.html" %}
{% set active_tab = 'smtp' %}
{% block title %}SMTP Göndericiler{% endblock %}
{% block subtitle %}SMTP protokolü ile gönderici hesapları{% endblock %}

{% block settings_content %}

<!-- SMTP Listesi -->
<div id="smtp-list" style="margin-bottom:20px">
    <div style="color:var(--muted);text-align:center;padding:20px">Yükleniyor...</div>
</div>

<!-- SMTP Form -->
<div class="card">
    <div class="card-title" id="smtp-form-title">➕ Yeni SMTP Gönderici</div>
    <div class="fg">
        <div class="g2">
            <div class="field"><label>Görünen Ad *</label><input id="smtp-name" placeholder="Firma Adı"></div>
            <div class="field"><label>Gönderici E-posta *</label><input id="smtp-email" placeholder="info@firma.com"></div>
        </div>
        <div class="g3">
            <div class="field"><label>SMTP Sunucu *</label><input id="smtp-server" placeholder="mail.firma.com"></div>
            <div class="field">
                <label>Port</label>
                <input id="smtp-port" value="465">
                <div class="pills" style="margin-top:6px">
                    <button class="pill active" onclick="setSPort(465,this)">465 SSL</button>
                    <button class="pill" onclick="setSPort(587,this)">587 TLS</button>
                    <button class="pill" onclick="setSPort(25,this)">25</button>
                </div>
            </div>
            <div class="field"><label>Kullanıcı Adı *</label><input id="smtp-user" placeholder="info@firma.com"></div>
        </div>
        <div class="g2">
            <div class="field">
                <label>Şifre <span style="color:var(--muted);font-size:10px">(düzenlemede boş = değiştirme)</span></label>
                <div class="pw-wrap"><input type="password" id="smtp-pass" placeholder="••••••••"><button class="pw-eye" onclick="togglePw('smtp-pass',this)">👁</button></div>
            </div>
            <div class="field"><label>Bağlantı</label>
                <div class="toggle-row"><span class="tgl-label">SSL kullan</span><label class="tgl"><input type="checkbox" id="smtp-ssl" checked><span class="tgl-sl"></span></label></div>
            </div>
        </div>
    </div>
    <div class="btn-row" style="margin-top:14px">
        <button class="btn btn-primary" onclick="saveSmtp()"><div class="sp" id="smtp-sp"></div><span id="smtp-btn-txt">💾 Kaydet</span></button>
        <button class="btn btn-outline" onclick="cancelSmtp()" id="smtp-cancel-btn" style="display:none">İptal</button>
    </div>
    <div class="alert" id="smtp-alert"></div>
</div>

<script>
let _editSmtpId = null;

document.addEventListener('DOMContentLoaded', loadSmtpList);

async function loadSmtpList() {
    try {
        const d = await (await fetch('/api/senders')).json();
        const senders = (d.data || []).filter(s => s.sender_mode === 'smtp');
        const container = document.getElementById('smtp-list');
        if (!senders.length) {
            container.innerHTML = '<div class="card" style="padding:20px;text-align:center;color:var(--muted)">Henüz SMTP gönderici eklenmedi. Aşağıdan ekleyin.</div>';
            return;
        }
        container.innerHTML = `
        <div style="background:var(--s1);border:1px solid var(--border);border-radius:var(--r3);overflow:hidden">
            <table style="width:100%;border-collapse:collapse;font-size:13px">
                <thead>
                    <tr style="border-bottom:1px solid var(--border)">
                        <th style="text-align:left;padding:11px 16px;color:var(--muted);font-weight:500;font-size:11px">Ad</th>
                        <th style="text-align:left;padding:11px 16px;color:var(--muted);font-weight:500;font-size:11px">E-posta</th>
                        <th style="text-align:left;padding:11px 16px;color:var(--muted);font-weight:500;font-size:11px">Sunucu</th>
                        <th style="text-align:left;padding:11px 16px;color:var(--muted);font-weight:500;font-size:11px">Port</th>
                        <th style="text-align:left;padding:11px 16px;color:var(--muted);font-weight:500;font-size:11px">SSL</th>
                        <th style="text-align:left;padding:11px 16px;color:var(--muted);font-weight:500;font-size:11px">Durum</th>
                        <th style="padding:11px 16px;width:110px"></th>
                    </tr>
                </thead>
                <tbody>
                    ${senders.map(s => `
                    <tr style="border-bottom:1px solid var(--border)">
                        <td style="padding:12px 16px;font-weight:600">${esc(s.name)}</td>
                        <td style="padding:12px 16px;font-size:11px;font-family:'Space Mono',monospace;color:var(--muted)">${esc(s.email)}</td>
                        <td style="padding:12px 16px;font-size:11px;font-family:'Space Mono',monospace">${esc(s.smtp_server||'')}</td>
                        <td style="padding:12px 16px;font-size:12px">${s.smtp_port||''}</td>
                        <td style="padding:12px 16px">${s.use_ssl ? '<span class="chip chip-ok" style="font-size:10px">✓ SSL</span>' : '<span class="chip chip-off" style="font-size:10px">✗</span>'}</td>
                        <td style="padding:12px 16px"><span class="chip ${s.is_active?'chip-on':'chip-off'}">${s.is_active?'Aktif':'Pasif'}</span></td>
                        <td style="padding:12px 16px;white-space:nowrap;text-align:right">
                            <button class="btn btn-outline btn-sm" onclick="testSmtp(${s.id})" title="Bağlantı test et">🔌</button>
                            <button class="btn btn-outline btn-sm" onclick="editSmtp(${s.id})" title="Düzenle">✏</button>
                            <button class="btn btn-danger btn-sm" onclick="delSmtp(${s.id})" title="Sil">🗑</button>
                        </td>
                    </tr>`).join('')}
                </tbody>
            </table>
        </div>`;
    } catch(e) { console.error(e); }
}

async function editSmtp(id) {
    const d = await (await fetch('/api/senders')).json();
    const s = (d.data||[]).find(x => x.id === id);
    if (!s) return;
    _editSmtpId = id;
    document.getElementById('smtp-name').value   = s.name || '';
    document.getElementById('smtp-email').value  = s.email || '';
    document.getElementById('smtp-server').value = s.smtp_server || '';
    document.getElementById('smtp-port').value   = s.smtp_port || 465;
    document.getElementById('smtp-user').value   = s.username || '';
    document.getElementById('smtp-pass').value   = '';
    document.getElementById('smtp-ssl').checked  = !!s.use_ssl;
    document.getElementById('smtp-form-title').textContent = '✏ Düzenle: ' + s.name;
    document.getElementById('smtp-cancel-btn').style.display = 'inline-flex';
    document.getElementById('smtp-btn-txt').textContent = '💾 Güncelle';
    hideAlert('smtp-alert');
    document.querySelector('.card:last-child').scrollIntoView({behavior:'smooth'});
}

function cancelSmtp() {
    _editSmtpId = null;
    ['smtp-name','smtp-email','smtp-server','smtp-user','smtp-pass'].forEach(id => {
        const el = document.getElementById(id); if(el) el.value = '';
    });
    document.getElementById('smtp-port').value = '465';
    document.getElementById('smtp-ssl').checked = true;
    document.getElementById('smtp-form-title').textContent = 'Yeni SMTP Gönderici';
    document.getElementById('smtp-cancel-btn').style.display = 'none';
    document.getElementById('smtp-btn-txt').textContent = '💾 Kaydet';
}

async function saveSmtp() {
    const sp = document.getElementById('smtp-sp'), btxt = document.getElementById('smtp-btn-txt');
    sp.style.display = 'block'; btxt.textContent = 'Kaydediliyor...'; hideAlert('smtp-alert');
    const p = {
        name:        document.getElementById('smtp-name').value.trim(),
        email:       document.getElementById('smtp-email').value.trim(),
        sender_mode: 'smtp',
        smtp_server: document.getElementById('smtp-server').value.trim(),
        smtp_port:   parseInt(document.getElementById('smtp-port').value) || 465,
        username:    document.getElementById('smtp-user').value.trim(),
        password:    document.getElementById('smtp-pass').value,
        use_ssl:     document.getElementById('smtp-ssl').checked ? 1 : 0,
        is_active:   1,
    };
    if (!p.name || !p.email || !p.smtp_server || !p.username) {
        showAlert('smtp-alert', 'Ad, e-posta, sunucu ve kullanıcı adı zorunludur.', 'err');
        sp.style.display = 'none'; btxt.textContent = '💾 Kaydet'; return;
    }
    const url = _editSmtpId ? `/api/senders/${_editSmtpId}` : '/api/senders';
    try {
        const d = await (await fetch(url, {
            method: _editSmtpId ? 'PUT' : 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(p)
        })).json();
        showAlert('smtp-alert', d.message, d.success ? 'ok' : 'err');
        if (d.success) { cancelSmtp(); loadSmtpList(); }
    } catch(e) { showAlert('smtp-alert', 'Bağlantı hatası: ' + e.message, 'err'); }
    finally { sp.style.display = 'none'; btxt.textContent = '💾 Kaydet'; }
}

async function testSmtp(id) {
    showAlert('smtp-alert', '⏳ Test ediliyor...', 'ok');
    const d = await (await fetch(`/api/senders/${id}/test`, {method:'POST'})).json();
    showAlert('smtp-alert', (d.success ? '✅ ' : '❌ ') + d.message, d.success ? 'ok' : 'err');
}

async function delSmtp(id) {
    if (!confirm('Bu göndericiye ait tüm loglar da silinecek. Emin misiniz?')) return;
    const d = await (await fetch(`/api/senders/${id}`, {method:'DELETE'})).json();
    if (d.success) loadSmtpList(); else alert(d.message);
}
</script>

{% endblock %}
