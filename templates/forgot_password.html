<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Şifremi Unuttum — MailSender Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg:#0f1117; --s1:#161b22; --s2:#1c2230;
            --border:rgba(255,255,255,.08); --text:#e6edf3; --muted:#7d8590;
            --accent:#6366f1; --ok:#34d399; --err:#f87171; --r:10px;
        }
        body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif;
               min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .wrap { width:100%; max-width:380px; padding:24px; }
        .logo { text-align:center; margin-bottom:28px; }
        .logo-icon { font-size:36px; display:block; margin-bottom:8px; }
        .logo h1 { font-size:18px; font-weight:700; }
        .logo p  { font-size:12px; color:var(--muted); margin-top:4px; }
        .card { background:var(--s1); border:1px solid var(--border);
                border-radius:var(--r); padding:28px; }
        .field { margin-bottom:18px; }
        label { display:block; font-size:12px; font-weight:500; color:var(--muted);
                margin-bottom:6px; text-transform:uppercase; letter-spacing:.3px; }
        input { width:100%; background:var(--s2); border:1px solid var(--border);
                border-radius:7px; padding:10px 14px; color:var(--text);
                font-size:14px; font-family:inherit; outline:none; transition:border-color .2s; }
        input:focus { border-color:var(--accent); }
        .btn { width:100%; padding:11px; background:var(--accent); color:#fff;
               border:none; border-radius:8px; font-size:14px; font-weight:600;
               cursor:pointer; transition:background .2s; display:flex;
               align-items:center; justify-content:center; gap:8px; }
        .btn:hover { background:#4f46e5; }
        .btn:disabled { opacity:.6; cursor:default; }
        .alert { margin-top:14px; padding:10px 14px; border-radius:8px;
                 font-size:13px; display:none; }
        .alert.err { background:rgba(248,113,113,.1); border:1px solid rgba(248,113,113,.3);
                     color:var(--err); display:block; }
        .alert.ok  { background:rgba(52,211,153,.1); border:1px solid rgba(52,211,153,.3);
                     color:var(--ok); display:block; }
        .back { display:block; text-align:center; margin-top:16px; font-size:12px;
                color:var(--muted); text-decoration:none; transition:color .15s; }
        .back:hover { color:var(--text); }
        .sp { width:16px; height:16px; border:2px solid rgba(255,255,255,.3);
              border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite;
              display:none; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>
<div class="wrap">
    <div class="logo">
        <span class="logo-icon">✦</span>
        <h1>Şifremi Unuttum</h1>
        <p>Kullanıcı adınızı veya e-postanızı girin</p>
    </div>
    <div class="card">
        <div class="field">
            <label>Kullanıcı Adı veya E-posta</label>
            <input type="text" id="identity" placeholder="admin veya ornek@mail.com"
                   autocomplete="username"
                   onkeydown="if(event.key==='Enter') doReset()">
        </div>
        <button class="btn" onclick="doReset()" id="reset-btn">
            <div class="sp" id="sp"></div>
            <span id="btn-txt">📧 Sıfırlama Bağlantısı Gönder</span>
        </button>
        <div class="alert" id="alert"></div>
    </div>
    <a href="/auth/login" class="back">← Giriş sayfasına dön</a>
</div>
<script>
async function doReset() {
    const identity = document.getElementById('identity').value.trim();
    const alert_el = document.getElementById('alert');
    const btn      = document.getElementById('reset-btn');
    const sp       = document.getElementById('sp');
    const txt      = document.getElementById('btn-txt');

    alert_el.className = 'alert';
    if (!identity) {
        alert_el.textContent = 'Kullanıcı adı veya e-posta girin.';
        alert_el.className = 'alert err';
        return;
    }

    btn.disabled = true;
    sp.style.display = 'block';
    txt.textContent  = 'Gönderiliyor…';

    try {
        const d = await (await fetch('/auth/forgot-password', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({identity})
        })).json();

        if (d.success) {
            alert_el.textContent = d.message;
            alert_el.className   = 'alert ok';
            btn.disabled = true;  // Tekrar gönderimi önle
            sp.style.display = 'none';
            txt.textContent  = '✓ Gönderildi';
        } else {
            alert_el.textContent = d.message || 'Bir hata oluştu.';
            alert_el.className   = 'alert err';
            btn.disabled = false;
            sp.style.display = 'none';
            txt.textContent  = '📧 Sıfırlama Bağlantısı Gönder';
        }
    } catch(e) {
        alert_el.textContent = 'Bağlantı hatası.';
        alert_el.className   = 'alert err';
        btn.disabled = false;
        sp.style.display = 'none';
        txt.textContent  = '📧 Sıfırlama Bağlantısı Gönder';
    }
}
</script>
</body>
</html>
