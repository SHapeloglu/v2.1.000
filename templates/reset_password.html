<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Yeni Şifre — MailSender Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg:#0f1117; --s1:#161b22; --s2:#1c2230;
            --border:rgba(255,255,255,.08); --text:#e6edf3; --muted:#7d8590;
            --accent:#6366f1; --ok:#34d399; --err:#f87171; --warn:#fbbf24; --r:10px;
        }
        body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif;
               min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .wrap { width:100%; max-width:380px; padding:24px; }
        .logo { text-align:center; margin-bottom:28px; }
        .logo-icon { font-size:36px; display:block; margin-bottom:8px; }
        .logo h1 { font-size:18px; font-weight:700; }
        .logo p  { font-size:12px; color:var(--muted); margin-top:4px; }
        .card { background:var(--s1); border:1px solid var(--border);
                border-radius:var(--r); padding:28px; }
        .field { margin-bottom:16px; }
        label { display:block; font-size:12px; font-weight:500; color:var(--muted);
                margin-bottom:6px; text-transform:uppercase; letter-spacing:.3px; }
        .pw-wrap { position:relative; }
        input { width:100%; background:var(--s2); border:1px solid var(--border);
                border-radius:7px; padding:10px 40px 10px 14px; color:var(--text);
                font-size:14px; font-family:inherit; outline:none; transition:border-color .2s; }
        input:focus { border-color:var(--accent); }
        .eye { position:absolute; right:10px; top:50%; transform:translateY(-50%);
               background:none; border:none; color:var(--muted); cursor:pointer;
               font-size:14px; padding:4px; line-height:1; }
        .strength { height:3px; border-radius:2px; margin-top:6px;
                    background:var(--border); overflow:hidden; }
        .strength-bar { height:100%; width:0; border-radius:2px; transition:width .3s,background .3s; }
        .btn { width:100%; padding:11px; background:var(--accent); color:#fff;
               border:none; border-radius:8px; font-size:14px; font-weight:600;
               cursor:pointer; transition:background .2s; display:flex;
               align-items:center; justify-content:center; gap:8px; margin-top:4px; }
        .btn:hover  { background:#4f46e5; }
        .btn:disabled { opacity:.6; cursor:default; }
        .alert { margin-top:14px; padding:10px 14px; border-radius:8px; font-size:13px; display:none; }
        .alert.err  { background:rgba(248,113,113,.1); border:1px solid rgba(248,113,113,.3);
                      color:var(--err); display:block; }
        .alert.ok   { background:rgba(52,211,153,.1);  border:1px solid rgba(52,211,153,.3);
                      color:var(--ok);  display:block; }
        .alert.warn { background:rgba(251,191,36,.1);  border:1px solid rgba(251,191,36,.3);
                      color:var(--warn); display:block; }
        .back { display:block; text-align:center; margin-top:16px; font-size:12px;
                color:var(--muted); text-decoration:none; transition:color .15s; }
        .back:hover { color:var(--text); }
        .sp { width:16px; height:16px; border:2px solid rgba(255,255,255,.3);
              border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; display:none; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>
<div class="wrap">
    <div class="logo">
        <span class="logo-icon">🔐</span>
        <h1>Yeni Şifre Belirle</h1>
        {% if username %}<p>Hesap: <strong>{{ username }}</strong></p>{% endif %}
    </div>

    {% if error %}
    <!-- Token geçersiz — sadece hata göster -->
    <div class="card">
        <div class="alert warn" style="display:block;margin-bottom:0">⚠ {{ error }}</div>
    </div>
    <a href="/auth/forgot-password" class="back">← Yeni sıfırlama bağlantısı iste</a>

    {% else %}
    <!-- Token geçerli — yeni şifre formu -->
    <div class="card">
        <div class="field">
            <label>Yeni Şifre</label>
            <div class="pw-wrap">
                <input type="password" id="password" placeholder="En az 6 karakter"
                       autocomplete="new-password"
                       oninput="checkStrength(this.value)"
                       onkeydown="if(event.key==='Enter') doChange()">
                <button class="eye" type="button" onclick="togglePw('password',this)">👁</button>
            </div>
            <div class="strength"><div class="strength-bar" id="strength-bar"></div></div>
        </div>
        <div class="field">
            <label>Şifre Tekrar</label>
            <div class="pw-wrap">
                <input type="password" id="confirm" placeholder="Şifreyi tekrar girin"
                       autocomplete="new-password"
                       onkeydown="if(event.key==='Enter') doChange()">
                <button class="eye" type="button" onclick="togglePw('confirm',this)">👁</button>
            </div>
        </div>
        <button class="btn" onclick="doChange()" id="change-btn">
            <div class="sp" id="sp"></div>
            <span id="btn-txt">✓ Şifremi Güncelle</span>
        </button>
        <div class="alert" id="alert"></div>
    </div>
    <a href="/auth/login" class="back">← Giriş sayfasına dön</a>
    {% endif %}
</div>

<script>
const TOKEN = {{ token | tojson }};

function togglePw(id, btn) {
    const inp = document.getElementById(id);
    inp.type  = inp.type === 'password' ? 'text' : 'password';
    btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

function checkStrength(pw) {
    const bar = document.getElementById('strength-bar');
    if (!bar) return;
    let score = 0;
    if (pw.length >= 6)  score++;
    if (pw.length >= 10) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    const colors = ['#f87171','#fbbf24','#fbbf24','#34d399','#34d399'];
    bar.style.width      = (score * 20) + '%';
    bar.style.background = colors[Math.max(0, score-1)] || '#f87171';
}

async function doChange() {
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;
    const alert_el = document.getElementById('alert');
    const btn      = document.getElementById('change-btn');
    const sp       = document.getElementById('sp');
    const txt      = document.getElementById('btn-txt');

    alert_el.className = 'alert';

    if (password.length < 6) {
        alert_el.textContent = 'Şifre en az 6 karakter olmalı.';
        alert_el.className   = 'alert err';
        return;
    }
    if (password !== confirm) {
        alert_el.textContent = 'Şifreler eşleşmiyor.';
        alert_el.className   = 'alert err';
        return;
    }

    btn.disabled = true;
    sp.style.display = 'block';
    txt.textContent  = 'Güncelleniyor…';

    try {
        const d = await (await fetch(`/auth/reset-password/${TOKEN}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({password, confirm})
        })).json();

        if (d.success) {
            alert_el.textContent = d.message + ' Yönlendiriliyorsunuz…';
            alert_el.className   = 'alert ok';
            sp.style.display = 'none';
            txt.textContent  = '✓ Güncellendi';
            setTimeout(() => window.location.href = '/auth/login', 2000);
        } else {
            alert_el.textContent = d.message || 'Bir hata oluştu.';
            alert_el.className   = 'alert err';
            btn.disabled = false;
            sp.style.display = 'none';
            txt.textContent  = '✓ Şifremi Güncelle';
        }
    } catch(e) {
        alert_el.textContent = 'Bağlantı hatası.';
        alert_el.className   = 'alert err';
        btn.disabled = false;
        sp.style.display = 'none';
        txt.textContent  = '✓ Şifremi Güncelle';
    }
}
</script>
</body>
</html>
